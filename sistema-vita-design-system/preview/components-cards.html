<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f5f3ef; font-family:system-ui,-apple-system,sans-serif; padding:20px; }
.meta { font-size:9px; font-weight:700; letter-spacing:0.10em; text-transform:uppercase; color:#b8b4ac; margin-bottom:8px; }
.sep { height:1px; background:#d4d0c8; margin:14px 0; }

/* Section card */
.card { border:1px solid #d4d0c8; background:#f5f3ef; margin-bottom:0; border-top-width:3px; max-width:420px; }
.card-green { border-top-color:#5aaa3a; }
.card-head { display:flex; align-items:center; justify-content:space-between; padding:14px 18px 12px; border-bottom:1px solid #d4d0c8; }
.card-title { font-size:10px; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; color:#1a1a1a; }
.badge { font-size:11px; font-weight:800; letter-spacing:0.04em; padding:3px 10px; border:1px solid; }
.badge-green { background:rgba(90,170,58,0.12); border-color:#5aaa3a; color:#3a7a1a; }
.card-body { padding:12px 18px; }

/* Check row */
.check { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #d4d0c8; cursor:pointer; }
.check:last-child { border-bottom:none; }
.check-box { width:20px; height:20px; border:1px solid #b0ac9f; display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; color:#b8b4ac; }
.check-box-on { background:#c8f564; border-color:#c8f564; color:#1a1a1a; }
.check-lbl { font-size:13px; color:#6e6a62; flex:1; }
.check-lbl-on { color:#1a1a1a; font-weight:500; }
.check-on { background:rgba(200,245,100,0.10); }
.check-badge { font-size:9px; font-weight:800; letter-spacing:0.08em; background:#c8f564; color:#1a1a1a; padding:2px 6px; }

/* Section layout */
.section { border-bottom:1px solid #d4d0c8; max-width:420px; }
.section-head { padding:14px 18px; border-bottom:1px solid #d4d0c8; display:flex; justify-content:space-between; align-items:center; }
.section-title { font-size:10px; font-weight:800; letter-spacing:0.22em; text-transform:uppercase; color:#6e6a62; }
.section-body { padding:20px 18px; }
</style>
</head><body>

<div class="meta">Section Card — Status border top</div>
<div class="card card-green">
  <div class="card-head">
    <span class="card-title">Corpo & Mente</span>
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:10px;font-weight:700;letter-spacing:0.06em;color:#6e6a62;border:1px solid #d4d0c8;padding:2px 8px;">12g rucking</span>
      <span class="badge badge-green">4/4</span>
    </div>
  </div>
  <div class="card-body">
    <div class="check check-on">
      <span class="check-box check-box-on">✓</span>
      <span class="check-lbl check-lbl-on">Rucking fatto</span>
      <span class="check-badge">12g</span>
    </div>
    <div class="check check-on">
      <span class="check-box check-box-on">✓</span>
      <span class="check-lbl check-lbl-on">Sonno 7h+</span>
    </div>
    <div class="check">
      <span class="check-box">○</span>
      <span class="check-lbl">Stesso orario di ieri</span>
    </div>
    <div class="check">
      <span class="check-box">○</span>
      <span class="check-lbl">Lettura o contenuto costruttivo</span>
    </div>
  </div>
</div>

<div class="sep"></div>
<div class="meta">Section Layout (page sections)</div>
<div class="section">
  <div class="section-head">
    <span class="section-title">Peso & Misure</span>
    <button style="background:#c8f564;color:#1a1a1a;border:none;padding:7px 14px;font-size:10px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;font-family:inherit;border-radius:0;">Aggiungi</button>
  </div>
  <div class="section-body" style="display:flex;gap:40px;">
    <div>
      <div style="font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#6e6a62;margin-bottom:4px;">Peso attuale</div>
      <div style="font-size:28px;font-weight:800;letter-spacing:-0.03em;color:#1a1a1a;line-height:1;">78.5 <span style="font-size:14px;font-weight:400;color:#6e6a62;">kg</span></div>
    </div>
    <div>
      <div style="font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#6e6a62;margin-bottom:4px;">Δ settimana</div>
      <div style="font-size:28px;font-weight:800;letter-spacing:-0.03em;color:#1a1a1a;line-height:1;">−0.3 <span style="font-size:14px;font-weight:400;color:#6e6a62;">kg</span></div>
    </div>
  </div>
</div>

</body></html>
