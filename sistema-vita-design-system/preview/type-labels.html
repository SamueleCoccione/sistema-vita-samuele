<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f5f3ef; font-family:system-ui,-apple-system,sans-serif; padding:20px; }
.row { display:flex; align-items:center; gap:20px; border-bottom:1px solid #d4d0c8; padding:12px 0; }
.label-demo { font-size:9px; font-weight:700; letter-spacing:0.10em; text-transform:uppercase; color:#b8b4ac; width:70px; }
</style>
</head><body>

<div class="row">
  <span class="label-demo">nav</span>
  <nav style="background:#1a1a1a;display:flex;">
    <a style="text-decoration:none;color:#555;padding:14px 22px;font-size:10px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;border-right:1px solid #2a2a2a;">Dashboard</a>
    <a style="text-decoration:none;color:#c8f564;padding:14px 22px;font-size:10px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;border-right:1px solid #2a2a2a;">Corpo & Mente</a>
    <a style="text-decoration:none;color:#555;padding:14px 22px;font-size:10px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;">Money & Lavoro</a>
  </nav>
</div>

<div class="row">
  <span class="label-demo">section title</span>
  <span style="font-size:10px;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:#6e6a62;">Peso & Misure</span>
</div>

<div class="row">
  <span class="label-demo">card title</span>
  <span style="font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:#1a1a1a;">Corpo & Mente</span>
</div>

<div class="row">
  <span class="label-demo">stat label</span>
  <div>
    <div style="font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#6e6a62;margin-bottom:4px;">Patrimonio netto</div>
    <div style="font-size:28px;font-weight:800;letter-spacing:-0.03em;line-height:1;color:#1a1a1a;">€47.200</div>
  </div>
</div>

<div class="row">
  <span class="label-demo">streak</span>
  <div style="display:flex;align-items:baseline;gap:6px;">
    <span style="font-size:22px;font-weight:800;letter-spacing:-0.02em;color:#c8f564;background:#1a1a1a;padding:2px 8px;line-height:1;">12</span>
    <span style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.45);background:#1a1a1a;padding:2px 8px;">streak attuale</span>
  </div>
</div>

<div class="row">
  <span class="label-demo">date</span>
  <span style="font-size:11px;font-weight:700;letter-spacing:0.10em;text-transform:uppercase;color:rgba(255,255,255,0.5);background:#1a1a1a;padding:4px 8px;">Giovedì 24 Aprile 2025</span>
</div>

<div class="row">
  <span class="label-demo">hint</span>
  <span style="font-size:10px;color:#b8b4ac;letter-spacing:0.04em;">JSON completo · per analisi con Claude Advisor</span>
</div>

</body></html>
