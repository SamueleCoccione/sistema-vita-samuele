<body>
<div class="global-grain"></div>

<script type="text/babel" src="NavBar.jsx"></script>
<script type="text/babel" src="DashboardScreen.jsx"></script>
<script type="text/babel" src="CorpoMenteScreen.jsx"></script>
<script type="text/babel" src="MoneyLavoroScreen.jsx"></script>

<div id="root"></div>

<script type="text/babel">
const SCREENS = ['dashboard','corpo-mente','money-lavoro','relazioni','liberta','progetto-digitale'];

function ComingSoon({ title }) {
  return React.createElement('div', { className: 'coming-soon' },
    React.createElement('div', { className: 'coming-soon-dot' }),
    React.createElement('span', null, `${title} — in sviluppo`)
  );
}

function App() {
  const [screen, setScreen] = React.useState('dashboard');

  const renderScreen = () => {
    switch (screen) {
      case 'dashboard':        return React.createElement(DashboardScreen);
      case 'corpo-mente':      return React.createElement(CorpoMenteScreen);
      case 'money-lavoro':     return React.createElement(MoneyLavoroScreen);
      case 'relazioni':        return React.createElement(ComingSoon, { title: 'Relazioni' });
      case 'liberta':          return React.createElement(ComingSoon, { title: 'Libertà' });
      case 'progetto-digitale':return React.createElement(ComingSoon, { title: 'Progetto Digitale' });
      default:                 return React.createElement(DashboardScreen);
    }
  };

  return React.createElement(React.Fragment, null,
    React.createElement(NavBar, { active: screen, onNav: setScreen }),
    React.createElement('main', null, renderScreen())
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
